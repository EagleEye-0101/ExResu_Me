services:
  - type: web
    name: exresu-me-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/resume_builder.db
      - key: EXPORT_DIR
        value: ./exports
      - key: DEFAULT_AI_PROVIDER
        value: google_ai_studio
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://ex-resu-me.vercel.app
